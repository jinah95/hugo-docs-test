backend:
  name: github
  repo: jinah95/hugo-docs-test
  branch: main
media_folder: "static/uploads"
public_folder: "/uploads"
collections:
  - name: "docs"
    label: "📚 전체 가이드북 관리"
    folder: "content/docs"
    create: true
    slug: "{{fields.category_path}}/{{fields.file_name}}"

    # 🎯 [치트키] 목록 화면에 그룹 필터를 줍니다.
    # 이렇게 해두면 목록 화면 왼쪽에 카테고리별로 필터링/그룹핑할 수 있는 UI가 생성됩니다!
    view_groups:
      - label: "📂 카테고리별 보기"
        field: "category_path"
        # 만약 루트(_index.md 등)를 따로 표시하고 싶다면 아래 패턴도 인식합니다.
        # pattern: '(?P<value>.*)'

    # 목록 뷰 텍스트도 좀 더 알아보기 쉽게 변경
    summary: "[순서: {{fields.weight}}] {{fields.title}} (파일명: {{fields.file_name}})"

    fields:
      - {
          label: "📂 카테고리 폴더명 (영문)",
          name: "category_path",
          widget: "string",
          hint: "예: software, hardware, faq / 루트에 둘 거면 빈칸",
        }
      - {
          label: "💾 저장될 파일명 (영문)",
          name: "file_name",
          widget: "string",
          hint: "일반 문서는 'install' 등 / 새 폴더 대문은 반드시 '_index' 입력",
        }
      - { label: "📝 화면에 보일 제목", name: "title", widget: "string" }
      - { label: "작성일자", name: "date", widget: "datetime" }
      - {
          label: "사이드바 순서 (weight)",
          name: "weight",
          widget: "number",
          value_type: "int",
          default: 10,
        }
      - {
          label: "📁 하위 문서 접기 (BookCollapseSection)",
          name: "bookCollapseSection",
          widget: "boolean",
          default: true,
        }
      - {
          label: "✨ 카테고리 강조 스타일 (BookFlatSection)",
          name: "bookFlatSection",
          widget: "boolean",
          default: true,
        }
      - { label: "본문 내용", name: "body", widget: "markdown" }
