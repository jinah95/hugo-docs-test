<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Decap Content Manager</title>

    <script
      src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"
      defer
    ></script>

    <script>
      // DOMContentLoaded 시점에 안전하게 디카프 설정을 주입합니다.
      document.addEventListener("DOMContentLoaded", function () {
        const interval = setInterval(() => {
          if (typeof CMS !== "undefined") {
            clearInterval(interval);
            CMS.init({
              config: {
                backend: {
                  name: "github",
                  repo: "jinah95/hugo-docs-test",
                  branch: "main",
                  auth_type: "implicit",
                  app_id: "Ov23liUQmlwPSjvOHOxg", // 여기에 Client ID 주입!
                },
              },
            });
          }
        }, 50);
      });
    </script>
  </head>
  <body></body>
</html>
