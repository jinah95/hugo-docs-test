<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Decap Content Manager</title>
  </head>
  <body>
    <!-- ⭕ Decap 오피셜 CDN 주소로 명확하게 변경합니다 -->
    <script
      src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"
      onload="initCMS()"
    ></script>

    <script>
      // 🎯 CDN 로드가 완벽히 끝난 후 브라우저에 CMS 객체가 안착되면 안전하게 실행합니다.
      function initCMS() {
        if (typeof CMS !== "undefined") {
          CMS.init({
            config: {
              backend: {
                name: "github",
                repo: "jinah95/hugo-docs-test",
                branch: "main",
                auth_type: "implicit",
                app_id: "Ov23liUQmlwPSjvOHOxg", // 여기에 GitHub OAuth App의 Client ID를 주입!
              },
            },
          });
        } else {
          console.error("Decap CMS 로드 실패 😭");
        }
      }
    </script>
  </body>
</html>
