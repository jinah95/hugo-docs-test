backend:
  name: github
  repo: jinah95/hugo-docs-test
  branch: main
media_folder: "static/uploads"
public_folder: "/uploads"
collections:
  - name: "docs"
    label: "가이드 문서 관리"
    folder: "content/docs"
    create: true
    # 트리 구조(중첩 경로) 활성화
    nested: { depth: 1 }
    path: "{{slug}}"
    slug: "{{slug}}"
    extension: "md"
    format: "toml-frontmatter"
    fields:
      - { label: "제목", name: "title", widget: "string" }
      - { label: "작성일자", name: "date", widget: "datetime" }
      - { label: "본문 내용", name: "body", widget: "markdown" }

  - name: "docs_software"
    label: "소프트웨어 가이드"
    folder: "content/docs/software" # 🎯 타겟 폴더를 software 내부로 고정!
    create: true
    path: "{{slug}}"
    slug: "{{slug}}"
    extension: "md"
    format: "toml-frontmatter"
    fields:
      - { label: "제목", name: "title", widget: "string" }
      - { label: "작성일자", name: "date", widget: "datetime" }
      - { label: "본문 내용", name: "body", widget: "markdown" }
