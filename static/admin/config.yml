backend:
  name: github
  repo: jinah95/hugo-docs-test
  branch: main
media_folder: "static/uploads"
public_folder: "/uploads"
collections:
  - name: "docs"
    label: "📚 전체 가이드북 관리"
    folder: "content/docs"
    create: true
    extension: "md"
    format: "toml-frontmatter"

    # 🎯 [치트키 1] 복잡한 중복 에러의 주범인 meta.path 설정을 과감히 지우거나
    # 아래처럼 slug 자체에 '카테고리 경로'가 변수로 결합되도록 길을 완전히 터줍니다.
    slug: "{{fields.category_path}}/{{fields.file_name}}"

    # 목록 뷰에서 보기 좋게 템플릿만 유지
    summary: "[{{fields.category_path}}] {{fields.title}}"

    fields:
      # 🎯 [핵심 2] 카테고리 폴더명을 직접 치거나 고르게 만듭니다.
      - {
          label: "📂 카테고리 폴더명 (영문)",
          name: "category_path",
          widget: "string",
          hint: "예: software 또는 hardware / 루트에 둘 거면 빈칸",
        }

      # 🎯 [핵심 3] 파일명을 중복 없이 직접 제어합니다.
      - {
          label: "💾 저장될 파일명 (영문)",
          name: "file_name",
          widget: "string",
          hint: "일반 문서는 'install', 'intro' 등 / 새 폴더 대문은 반드시 '_index' 입력",
        }

      - { label: "📝 화면에 보일 제목", name: "title", widget: "string" }
      - { label: "작성일자", name: "date", widget: "datetime" }
      - {
          label: "사이드바 순서 (weight)",
          name: "weight",
          widget: "number",
          value_type: "int",
          default: 10,
        }
      - {
          label: "📁 하위 문서 접기 (BookCollapseSection)",
          name: "bookCollapseSection",
          widget: "boolean",
          default: true,
          hint: "폴더 대문(_index)을 만들 때만 켜두세요.",
        }

      # 🎯 [치트키 2] 카테고리 볼드 이름표 옵션 기본값 활성화
      - {
          label: "✨ 카테고리 강조 스타일 (BookFlatSection)",
          name: "bookFlatSection",
          widget: "boolean",
          default: true,
          hint: "폴더 대문(_index)을 만들 때만 켜두세요.",
        }
      - { label: "본문 내용", name: "body", widget: "markdown" }
