backend:
  name: github
  repo: jinah95/hugo-docs-test
  branch: main
  auth_type: implicit
  app_id: Ov23liUQmlwPSjvOHOxg
media_folder: "static/uploads"
public_folder: "/uploads"
collections:
  - name: "docs"
    label: "가이드 문서 관리"
    folder: "content/docs"
    create: true
    # 트리 구조(중첩 경로) 활성화
    nested: { depth: 1 }
    path: "{{slug}}"
    slug: "{{slug}}"
    extension: "md"
    format: "toml-frontmatter"
    fields:
      - { label: "제목", name: "title", widget: "string" }
      - { label: "작성일자", name: "date", widget: "datetime" }
      - { label: "본문 내용", name: "body", widget: "markdown" }

  - name: "docs_software"
    label: "소프트웨어 가이드"
    folder: "content/docs/software" # 🎯 타겟 폴더를 software 내부로 고정!
    create: true
    path: "{{slug}}"
    slug: "{{slug}}"
    extension: "md"
    format: "toml-frontmatter"
    fields:
      - { label: "제목", name: "title", widget: "string" }
      - { label: "작성일자", name: "date", widget: "datetime" }
      - { label: "본문 내용", name: "body", widget: "markdown" }
      # 🎯 [진짜 치트키] 다른 문서들의 순서와 제목을 실시간으로 가져와 보여주는 드롭다운
      - {
          label: "📌 [참고] 기존 문서 순서 목록 확인",
          name: "current_docs_reference",
          widget: "relation",
          collection: "docs_software", # 내 폴더(software) 컬렉션을 참조
          search_fields: ["title"], # 검색 기준
          value_field: "weight", # 선택 시 저장될 값 (여기는 매핑용)
          display_fields: ["weight", "title"], # 🌟 [핵심] 드롭다운에 "30 | 소프트웨어 시작하기" 형태로 출력!
          required: false,
          description: "💡 현재 등록된 다른 문서들의 순서를 확인하는 창입니다. (여기서 값을 골라도 실제 순서가 바뀌지는 않으며, 아래 '진짜 순서 입력' 칸에 적을 숫자를 참고하는 용도로 쓰세요!)",
        }

      # ✍️ 위 드롭다운을 보고 "아하, 저게 30번이네? 난 40번 적어야지" 하고 입력하는 진짜 칸
      - {
          label: "🔢 진짜 사이드바 노출 순서 (숫자 직접 입력)",
          name: "weight",
          widget: "number",
          value_type: "int",
          default: 50,
        }
